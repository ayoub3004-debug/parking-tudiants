<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ParkEtudiant — Trouvez des places de parking gratuites pour étudiants à Orléans." />
  <title>ParkEtudiant Orléans — Parking gratuit pour étudiants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d0d0d'/><text x='16' y='22' text-anchor='middle' fill='%23c8f04a' font-size='16' font-weight='bold'>P</text></svg>" />
</head>
<body>

  <header>
    <a href="#" class="logo">
      <span>🅿</span>
      <span>Park<span>Etudiant</span></span>
    </a>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" onclick="openModal('modal-ajout')">
        + Ajouter un parking
      </button>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Parkings gratuits — Orléans</div>
        <div class="search-box">
          <input type="text" id="search" placeholder="Rechercher un parking..." />
        </div>
        <div class="filters">
          <button class="filter-chip" id="filter-pmr">♿ PMR</button>
          <button class="filter-chip" id="filter-fac">🎓 Proche fac</button>
        </div>
      </div>
      <div class="parking-list" id="parking-list">
        <div class="loading">Chargement des parkings...</div>
      </div>
    </aside>

    <div id="map"></div>
  </main>

  <!-- Modal détail -->
  <div class="modal-overlay" id="modal-detail">
    <div class="modal">
      <div class="modal-header">
        <h2>Détail parking</h2>
        <button class="modal-close" onclick="closeModal('modal-detail')">×</button>
      </div>
      <div class="modal-body" id="detail-body"></div>
    </div>
  </div>

  <!-- Modal ajout -->
  <div class="modal-overlay" id="modal-ajout">
    <div class="modal">
      <div class="modal-header">
        <h2>Ajouter un parking</h2>
        <button class="modal-close" onclick="closeModal('modal-ajout')">×</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--muted);margin-bottom:20px;">
          📍 Cliquez sur la carte pour positionner le parking, puis remplissez le formulaire. Votre soumission sera validée avant publication.
        </p>
        <div id="ajout-success" class="success-msg"></div>
        <form id="form-ajout" onsubmit="(e)=>e.preventDefault()">
          <div class="form-group">
            <label>Nom du parking *</label>
            <input type="text" id="add-nom" placeholder="Ex: Parking Université La Source" />
          </div>
          <div class="form-group">
            <label>Adresse *</label>
            <input type="text" id="add-adresse" placeholder="Ex: Rue de Chartres, 45100 Orléans" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Latitude * (clic sur carte)</label>
              <input type="number" id="add-lat" step="any" placeholder="47.xxx" readonly />
            </div>
            <div class="form-group">
              <label>Longitude * (clic sur carte)</label>
              <input type="number" id="add-lng" step="any" placeholder="1.xxx" readonly />
            </div>
          </div>
          <div class="form-group">
            <label>Nombre de places estimé</label>
            <input type="number" id="add-places" placeholder="0" min="0" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="add-desc" placeholder="Informations utiles sur ce parking..."></textarea>
          </div>
          <div class="form-group">
            <label style="margin-bottom:10px;">Options</label>
            <label class="form-check">
              <input type="checkbox" id="add-pmr" /> Accessible PMR
            </label>
            <label class="form-check" style="margin-top:8px;">
              <input type="checkbox" id="add-fac" /> Proche d'une faculté
            </label>
          </div>
          <div class="form-group">
            <label>Votre prénom (optionnel)</label>
            <input type="text" id="add-auteur" placeholder="Anonyme" />
          </div>
          <button type="button" class="btn btn-primary" style="width:100%" onclick="submitAjout()">
            Soumettre le parking
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
